# Text-level rules for MCP / agent JSON configs.
# Structural checks (permission combos, unpinned npx, hooks) live in the
# mcp_permissions analyzer.
rules:
  - id: SC-MCP-010
    title: Secret value inlined in config
    severity: medium
    category: mcp
    applies_to: [json]
    description: >
      An API key, token, or password appears as a literal value instead of an
      environment-variable reference. Anyone who obtains this file obtains
      the secret.
    patterns:
      - regex: '"[^"]*(API[_-]?KEY|APIKEY|TOKEN|SECRET|PASSWORD|PASSWD|AUTH)[^"]*"\s*:\s*"(?!\$\{?)[^"]{10,}"'
    examples:
      match: '"GITHUB_TOKEN": "ghp_16CharactersOfRealToken"'
      no_match: '"GITHUB_TOKEN": "${GITHUB_TOKEN}"'
    remediation: Reference secrets via environment variables, never literal values.

  - id: SC-MCP-011
    title: MCP server over unencrypted http://
    severity: medium
    category: mcp
    applies_to: [json]
    description: >
      A non-loopback MCP server URL uses plain HTTP; traffic (including tool
      results and tokens) can be read or modified in transit.
    patterns:
      - regex: '"(url|serverUrl|endpoint)"\s*:\s*"http://(?!localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])'
    examples:
      match: '"url": "http://tools.example.com/mcp"'
      no_match: '"url": "https://tools.example.com/mcp"'
