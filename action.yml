name: AgentAudit Security Scanner
description: Scan AI agent skills, rule files, and MCP configs for prompt injections and dangerous permissions.
branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Path to scan.
    required: false
    default: "."
  fail-on:
    description: "Severity threshold that fails the job: high | medium | low | info."
    required: false
    default: high
  format:
    description: "Output format: pretty | json | sarif | md."
    required: false
    default: pretty
  output:
    description: Optional file to write the report to (e.g. agentaudit.sarif).
    required: false
    default: ""
  version:
    description: 'agentaudit-scanner version specifier to install (e.g. "==0.1.1").'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install agentaudit
      shell: bash
      run: python -m pip install --disable-pip-version-check "agentaudit-scanner${{ inputs.version }}"
    - name: Run agentaudit
      shell: bash
      run: |
        args=(scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}" --format "${{ inputs.format }}")
        if [ -n "${{ inputs.output }}" ]; then
          args+=(--output "${{ inputs.output }}")
        fi
        agentaudit "${args[@]}"
